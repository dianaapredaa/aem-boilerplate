<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Side Panel Form</title>
    <link rel="stylesheet" href="../../styles/metadata-display.css">
</head>
<body>
<div class="side-panel">
    <form id="metadata-form">
        <h2>Display Metadata</h2>

        <!-- Initial input for file path -->
        <label for="filePath">File Path:</label>
        <input type="text" id="filePath" name="filePath" required>
        <button type="submit">Search</button>
    </form>

    <!-- Metadata fields that will be displayed after submission -->
    <div id="metadata-display" style="display: none;">
        <h3>Metadata Details</h3>
        <table>
            <tr>
                <th>Name</th>
                <td id="name"></td>
            </tr>
            <tr>
                <th>Path</th>
                <td id="path"></td>
            <tr>
                <th>ID</th>
                <td id="id"></td>
            </tr>
            <tr>
                <th>Created By</th>
                <td id="createdBy"></td>
            </tr>
            <tr>
                <th>Created DateTime</th>
                <td id="createdDateTime"></td>
            </tr>
            <tr>
                <th>Last Modified By</th>
                <td id="lastModifiedBy"></td>
            </tr>
            <tr>
                <th>Last Modified DateTime</th>
                <td id="lastModifiedDateTime"></td>
            </tr>
            <tr>
                <th>Live Copies</th>
                <td id="liveCopies"></td>
            </tr>
            <tr>
                <th>Blueprint</th>
                <td id="blueprint"></td>
            </tr>
            <tr>
                <th>Launch Source</th>
                <td id="launches"></td>
            </tr>

        </table>

        <!-- Button to reset the side panel -->
        <button id="reset-button">Reset</button>

    </div>

    <!-- Error message -->
    <div id="errorMessage"></div>
</div>
</body>

<!-- Load the script as a module -->
<script type="module" src="../display-metadata/scripts/script.js"></script>

</html>
