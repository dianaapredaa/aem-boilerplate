<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Side Panel Form</title>
    <link rel="stylesheet" href="../create-live-copy/css/style.css">
    <script src="../../styles/styles.css" defer></script>
</head>
<body>
<div class="side-panel">
    <form id="delete-live-copy">
        <h2>Delete Live Copy Relationship</h2>

        <label for="filePath">File Path:</label>
        <input type="text" id="filePath" name="filePath" required>

        <button type="submit">Delete Live Copy Relationship</button>
    </form>
    <!-- Error message -->
    <div id="errorMessage"></div>
</div>
</body>

<!-- Load the script as a module -->
<script type="module" src="../delete-live-copy/scripts/script.js"></script>

</html>
