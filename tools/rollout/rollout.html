<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Side Panel Form</title>
    <link rel="stylesheet" href="../../styles/styles.css">
</head>
<body>
<div class="side-panel">
    <form id="rollout">
        <h2>Rollout</h2>
        <!-- Initial input for file path -->
        <label for="filePath">Blueprint Path:</label>
        <input type="text" id="filePath" name="filePath" required>
        <button type="submit">Rollout</button>
    </form>
    <!-- Error message -->
    <div id="errorMessage"></div>
</div>
</body>

<!-- Load the script as a module -->
<script type="module" src="../rollout/scripts/script.js"></script>

</html>
