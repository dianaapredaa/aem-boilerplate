<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Side Panel Form</title>
    <link rel="stylesheet" href="../create-live-copy/css/style.css">
    <script src="../create-live-copy/scripts/script.js" defer></script>
</head>
<body>
<div class="side-panel">
    <form id="create-live-copy">
        <h2>Create Live Copy</h2>
        <label for="Title">Title:</label>
        <input type="text" id="Title" name="Title" required>

        <label for="LiveCopy-Name">LiveCopy Name:</label>
        <input type="text" id="LiveCopy-Name" name="LiveCopy-Name" required>

        <label for="Blueprint-path">Blueprint Path:</label>
        <input type="text" id="Blueprint-path" name="Blueprint-path" required>

        <label for="Destination-path">Destination Path:</label>
        <input type="text" id="Destination-path" name="Destination-path" required>

        <button type="submit">Submit</button>
    </form>

</div>

</body>
</html>
