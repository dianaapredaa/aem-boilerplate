<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Side Panel Form</title>
  <link rel="stylesheet" href="../style/msm-launches.css">
</head>
<body>
<div class="side-panel">
  <form id="cancel-inheritance">
    <h2>Cancel Inheritance</h2>

    <label for="filePath">File Path:</label>
    <input type="text" id="filePath" name="filePath" required>

    <button type="submit">Cancel Inheritance</button>
  </form>
  <!-- Error message -->
  <div id="errorMessage"></div>
</div>
</body>
<!-- Load the script as a module -->
<script type="module" src="../cancel-inheritance/scripts/script.js"></script>

</html>
