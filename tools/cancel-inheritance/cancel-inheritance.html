<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Side Panel Form</title>
  <link rel="stylesheet" href="../create-live-copy/css/style.css">
  <script src="../cancel-inheritance/scripts/script.js" defer></script>
</head>
<body>
<div class="side-panel">
  <form id="cancel-inheritance">
    <h2>Cancel Inheritance</h2>
    <!-- Initial input for file path -->
    <label for="filePath">File Path:</label>
    <input type="text" id="filePath" name="filePath" required>
    <button type="submit">Cancel Inheritance</button>
  </form>
  <!-- Error message -->
  <div id="errorMessage"></div>
</div>
</body>
</html>
